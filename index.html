<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>hee jin was here</title>
  <!--link rel="stylesheet" href="styles.css"-->

  <!-- Adobe Fonts kit (Plantin Pro) -->
  <link rel="preconnect" href="https://use.typekit.net" crossorigin>
  <link rel="preconnect" href="https://p.typekit.net" crossorigin>
  <link rel="stylesheet" href="https://use.typekit.net/acf8vqd.css">

  <style>
    
    :root{
      --font-plantin: "plantin", "plantin-pro", "Plantin Pro", "Courier New", Courier, monospace; /* your default */
      --font-sans:  "acumin-pro-semi-condensed", system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      --font-mono:  "receipt-narrow", "Courier New", Courier, monospace;
      
      --step--2: clamp(0.6875rem, 0.66rem + 0.10vw, 0.75rem);
      --step--1: clamp(0.8125rem, 0.76rem + 0.20vw, 0.9375rem);
      --step-0:  clamp(0.9375rem, 0.86rem + 0.30vw, 1.0625rem);
      --step-1:  clamp(1.125rem, 0.98rem + 0.70vw, 1.375rem);
      --step-2:  clamp(1.5rem, 1.1rem + 2vw, 2.5rem);
      --step-3:  clamp(2.5rem, 1.65rem + 4vw, 4.5rem);
      --step-4:  clamp(4rem, 2rem + 8vw, 8rem);

      --gap: clamp(0.75rem, 1.5vw, 1.5rem);
    }

    html, body { height: 100%; margin: 0; padding:0; background: #fff; }
    body {
      font-family:"plantin", "Courier New", Courier, monospace;   
      font-style:normal;              
      font-weight:400;
    }
	  
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

	  
    .font-plantin { font-family: var(--font-plantin); }
    .font-sans  { font-family: var(--font-sans);  }
    .font-mono  { font-family: var(--font-mono);  }
    
    .w-300 { font-weight:300; }
    .w-400 { font-weight:400; } /* Regular */
    .w-600 { font-weight:600; } /* Semibold */

	    html {
      -webkit-text-size-adjust: 100%;
    }
    
    html, body {
      margin: 0;
      padding: 0;
      background: #fff;
    }
    
    body {
      font-family: var(--font-plantin);
      font-style: normal;
      font-weight: 400;
    }
    
    .soon, .notice {
	  position: fixed;
      top: 0;
      left: 0;
      margin: 0;
	  line-height: 0.95;
	  font-synthesis: none;
	  user-select: none;
	}
	
    .soon {
      padding-left: 0.5rem;
      font-size: var(--step-4);
    }
	
	.notice {
      padding: 0 0 0 9px;
      font-size: clamp(72px, 18.5vw, 260px);
      font-weight: 400;
    }
	
	.text-2xs { font-size: var(--step--2); line-height: 1.1; }
	.text-xs  { font-size: var(--step--1); line-height: 1.15; }
	.text-sm  { font-size: var(--step-0);  line-height: 1.25; }
	.text-md  { font-size: var(--step-1);  line-height: 1.25; }
	.text-lg  { font-size: var(--step-2);  line-height: 1.15; }
	.text-xl  { font-size: var(--step-3);  line-height: 1.05; }


	/* responsive grid, simple */
	.gallery {
	  display: grid;
	  gap: var(--gap);
	  grid-template-columns: repeat(auto-fit, minmax(min(18rem, 100%), 1fr));
	}
	
	.gallery img {
	  display: block;
	  width: 100%;
	  height: auto;
	}

  </style>
</head>

<body>
	<main class="page stack">
		<section class="hero">
			<h1 class="notice">Access to content is not provided at this time.</h1>
		</section>
	</main>
</body>
</html>
